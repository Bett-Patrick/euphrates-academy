<svg width="500" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <title>Euphrates Academy Logo</title>
  <desc>School crest for Euphrates Academy, Kimoso, Bomet County, Kenya</desc>

  <style>
    .river { fill: none; stroke: #6ee7b7; stroke-width: 2.5; stroke-linecap: round; }
    .hills { fill: #047857; }
    .hills2 { fill: #059669; }
    .name-text { font-family: 'Georgia', serif; font-weight: 700; fill: #064e3b; font-size: 28px; letter-spacing: 2px; }
    .sub-text { font-family: 'Georgia', serif; font-weight: 400; fill: #065f46; font-size: 13px; letter-spacing: 3px; }
    .motto-text { font-family: 'Georgia', serif; font-weight: 400; fill: #78716c; font-size: 11px; letter-spacing: 1.5px; }
    .ribbon-text { font-family: 'Georgia', serif; font-weight: 700; fill: #064e3b; font-size: 10.5px; letter-spacing: 1.5px; }
  </style>

  <rect width="680" height="520" fill="white"/>

  <g transform="translate(340, 240)">
    <!-- Shield gold border -->
    <path d="M-95,0 L-95,-118 Q-95,-140 -70,-140 L70,-140 Q95,-140 95,-118 L95,30 Q95,80 40,115 L0,135 L-40,115 Q-95,80 -95,30 Z" fill="#d97706"/>
    <!-- Shield body -->
    <path d="M-88,0 L-88,-113 Q-88,-133 -66,-133 L66,-133 Q88,-133 88,-113 L88,28 Q88,76 36,110 L0,128 L-36,110 Q-88,76 -88,28 Z" fill="#064e3b"/>
    <line x1="-88" y1="-20" x2="88" y2="-20" stroke="#047857" stroke-width="1"/>

    <!-- Upper shield: hills -->
    <clipPath id="upperClip">
      <path d="M-88,-20 L-88,-113 Q-88,-133 -66,-133 L66,-133 Q88,-133 88,-113 L88,-20 Z"/>
    </clipPath>
    <g clip-path="url(#upperClip)">
      <rect x="-88" y="-133" width="176" height="113" fill="#065f46"/>
      <ellipse cx="-50" cy="-55" rx="55" ry="35" fill="#047857"/>
      <ellipse cx="20" cy="-65" rx="60" ry="40" fill="#047857"/>
      <ellipse cx="75" cy="-52" rx="45" ry="30" fill="#047857"/>
      <ellipse cx="-35" cy="-30" rx="60" ry="30" fill="#059669"/>
      <ellipse cx="50" cy="-28" rx="55" ry="28" fill="#059669"/>
      <path d="M-30,-110 Q0,-90 30,-110" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="-118" r="10" fill="#fbbf24" opacity="0.85"/>
    </g>

    <!-- Lower shield: book + river -->
    <clipPath id="lowerClip">
      <path d="M-88,-20 L88,-20 L88,28 Q88,76 36,110 L0,128 L-36,110 Q-88,76 -88,28 Z"/>
    </clipPath>
    <g clip-path="url(#lowerClip)">
      <rect x="-88" y="-20" width="176" height="150" fill="#047857"/>
      <rect x="-42" y="5" width="38" height="52" rx="3" fill="#d97706"/>
      <rect x="4" y="5" width="38" height="52" rx="3" fill="#d97706"/>
      <line x1="0" y1="5" x2="0" y2="57" stroke="#064e3b" stroke-width="3"/>
      <line x1="-36" y1="18" x2="-8" y2="18" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
      <line x1="-36" y1="26" x2="-8" y2="26" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
      <line x1="-36" y1="34" x2="-8" y2="34" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
      <line x1="-36" y1="42" x2="-8" y2="42" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
      <line x1="8" y1="18" x2="36" y2="18" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
      <line x1="8" y1="26" x2="36" y2="26" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
      <line x1="8" y1="34" x2="36" y2="34" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
      <line x1="8" y1="42" x2="36" y2="42" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
      <path d="M-65,72 Q-50,62 -35,72 Q-20,82 -5,72 Q10,62 25,72 Q40,82 55,72 Q65,64 70,68" class="river"/>
      <path d="M-65,82 Q-50,72 -35,82 Q-20,92 -5,82 Q10,72 25,82 Q40,92 55,82 Q65,74 70,78" class="river" opacity="0.5"/>
    </g>

    <!-- Torch -->
    <g transform="translate(0, -148)">
      <rect x="-5" y="5" width="10" height="22" rx="3" fill="#d97706"/>
      <path d="M0,-18 Q-8,-8 -6,0 Q-4,8 0,12 Q4,8 6,0 Q8,-8 0,-18 Z" fill="#fbbf24"/>
      <path d="M0,-12 Q-4,-4 -3,2 Q0,6 3,2 Q4,-4 0,-12 Z" fill="#ffffff" opacity="0.7"/>
    </g>

    <!-- Left laurel -->
    <g transform="translate(-105, -30)">
      <ellipse cx="-8" cy="-20" rx="9" ry="5" fill="#047857" transform="rotate(-40)"/>
      <ellipse cx="-6" cy="-8" rx="9" ry="5" fill="#047857" transform="rotate(-20)"/>
      <ellipse cx="-2" cy="4" rx="9" ry="5" fill="#047857" transform="rotate(0)"/>
      <ellipse cx="4" cy="16" rx="9" ry="5" fill="#047857" transform="rotate(20)"/>
      <ellipse cx="12" cy="26" rx="9" ry="5" fill="#047857" transform="rotate(40)"/>
      <line x1="0" y1="-28" x2="14" y2="30" stroke="#065f46" stroke-width="1.5"/>
    </g>
    <!-- Right laurel -->
    <g transform="translate(105, -30) scale(-1,1)">
      <ellipse cx="-8" cy="-20" rx="9" ry="5" fill="#047857" transform="rotate(-40)"/>
      <ellipse cx="-6" cy="-8" rx="9" ry="5" fill="#047857" transform="rotate(-20)"/>
      <ellipse cx="-2" cy="4" rx="9" ry="5" fill="#047857" transform="rotate(0)"/>
      <ellipse cx="4" cy="16" rx="9" ry="5" fill="#047857" transform="rotate(20)"/>
      <ellipse cx="12" cy="26" rx="9" ry="5" fill="#047857" transform="rotate(40)"/>
      <line x1="0" y1="-28" x2="14" y2="30" stroke="#065f46" stroke-width="1.5"/>
    </g>

    <!-- Ribbon -->
    <path d="M-80,148 Q-80,168 -60,162 L60,162 Q80,168 80,148 L80,138 L-80,138 Z" fill="#d97706"/>
    <rect x="-80" y="138" width="160" height="14" fill="#b45309"/>
    <path d="M-80,138 L-90,150 L-80,152 Z" fill="#b45309"/>
    <path d="M80,138 L90,150 L80,152 Z" fill="#b45309"/>
    <text x="0" y="151" text-anchor="middle" class="ribbon-text">KIMOSO · BOMET · KENYA</text>
  </g>

  <!-- Name + tagline -->
  <text x="340" y="410" text-anchor="middle" class="name-text">EUPHRATES ACADEMY</text>
  <text x="340" y="432" text-anchor="middle" class="sub-text">CBC PRIMARY SCHOOL</text>
  <line x1="240" y1="443" x2="300" y2="443" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="340" cy="443" r="3" fill="#d97706"/>
  <line x1="380" y1="443" x2="440" y2="443" stroke="#d97706" stroke-width="1.5"/>
  <text x="340" y="462" text-anchor="middle" class="motto-text">Nurturing Excellence · Building Character</text>
</svg>
